kind = "mobile"
previewPath = "/"
title = "CEO AI"
version = "1.0.0"
id = "artifacts/ceo-ai"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 19489

[services.development]
run = "pnpm --filter @workspace/ceo-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ceo-ai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/ceo-ai", "run", "serve" ]

[services.env]
PORT = "19489"
BASE_PATH = "/"
